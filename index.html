<!doctypehtml><html lang=en-us><head><meta charset=utf-8><meta content="text/html; charset=utf-8"http-equiv=Content-Type><meta content="width=device-width,initial-scale=1"name=viewport><title>Dragonwake</title><style>:root{color-scheme:dark;--page-bg:#12110f;--panel-bg:#1b1916;--panel-border:#574b39;--text-main:#e4dccf;--text-dim:#b3a48a;--accent:#d0b676;--shadow:rgba(0, 0, 0, 0.4)}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,rgba(208,182,118,.12),transparent 40%),linear-gradient(180deg,#191714 0,var(--page-bg) 100%);color:var(--text-main);font-family:"Iosevka Term","Cascadia Mono",Consolas,monospace}.page{width:min(100%,1100px);padding:24px;display:grid;gap:16px;justify-items:center}.frame{width:min(100%,980px);padding:14px;border:1px solid var(--panel-border);background:linear-gradient(180deg,rgba(34,31,28,.96),rgba(23,21,18,.98));box-shadow:0 20px 50px var(--shadow)}canvas{display:block;width:100%;height:auto;image-rendering:pixelated;image-rendering:crisp-edges;outline:0;background:#000}.notes{width:min(100%,980px);padding:12px 14px;border:1px solid rgba(87,75,57,.7);background:rgba(27,25,22,.88);color:var(--text-dim);line-height:1.45;font-size:14px}.notes strong{color:var(--accent)}</style><script>var Module={canvas:document.getElementById("canvas")}</script></head><body><main class=page><section class=frame><canvas id=canvas oncontextmenu=event.preventDefault() tabindex=0></canvas></section><section class=notes><strong>Local test:</strong> serve this build over <code>http://localhost</code> with <code>emrun</code> or <code>python -m http.server</code>. Click the canvas if the page needs focus before keyboard input starts landing.</section></main><script async src=dragonwake.js></script></body></html>
